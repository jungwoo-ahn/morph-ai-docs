<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 560" width="560" height="560">
  <defs>
    <linearGradient id="faceGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="50%" stop-color="#f3f5fb" />
      <stop offset="100%" stop-color="#e7ebf6" />
    </linearGradient>
    <!-- Blur filter for shadow shapes -->
    <filter id="shadowBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" />
    </filter>
    <filter id="earBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" />
    </filter>
  </defs>

  <!-- Outer circle: inset 6% -->
  <circle cx="280" cy="280" r="263" fill="#ffffff" fill-opacity="0.55" stroke="#000000" stroke-opacity="0.05" stroke-width="1" />

  <!-- Face shadow (separate element) -->
  <rect x="112" y="142" width="336" height="336" rx="141" ry="141"
        fill="#11141f" fill-opacity="0.45" filter="url(#shadowBlur)" />

  <!-- Inner face: 336x336, rounded-[42%] -->
  <rect x="112" y="112" width="336" height="336" rx="141" ry="141"
        fill="url(#faceGrad)" />

  <!-- Left ear shadow -->
  <rect x="67.2" y="161.6" width="112" height="112" rx="21.6" ry="21.6"
        transform="rotate(45, 123.2, 217.6)"
        fill="#0f1320" fill-opacity="0.55" filter="url(#earBlur)" />

  <!-- Left ear: left 12%, top 26%, 112px, rotate 45 -->
  <rect x="67.2" y="145.6" width="112" height="112" rx="21.6" ry="21.6"
        transform="rotate(45, 123.2, 201.6)"
        fill="#0d1018" />

  <!-- Right ear: right 14%, top 24%, 96px, rotate 45 -->
  <rect x="385.6" y="134.4" width="96" height="96" rx="19.2" ry="19.2"
        transform="rotate(45, 433.6, 182.4)"
        fill="#0d1018" />

  <!-- Light blue circle: bottom 16%, right 18% -->
  <circle cx="403.2" cy="414.4" r="56" fill="#dce5ff" fill-opacity="0.8" />
</svg>

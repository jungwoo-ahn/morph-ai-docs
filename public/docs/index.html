## What Morph Does

Morph AI is an AI-powered calendar and task management assistant. Users interact via a natural language chat interface to create, update, search, and manage events and tasks — all synced bi-directionally with Google Calendar and Google Tasks.

**Core value:** Event creation drops from 30 seconds (traditional UI) to 3 seconds (natural language).

Type what you need in plain English (or 9 other languages). The AI parses intent, extracts structured data, and presents a **preview card** for confirmation.

D[1] = `# Morph AI — Technical Architecture

## Overview

Morph AI is a production-grade Next.js 14 application. Fully written in TypeScript, uses Prisma ORM for type-safe database access, and is containerized with Docker for portable deployment.

---

## System Architecture

\`\`\`
┌──────────────────────────────────────────────────────┐
│                 Frontend (Next.js 14)                 │
│  ┌─────────┬──────────────────┬────────────────┐     │
│  │  Tasks  │    Calendar      │     Chat       │     │
│  │ Column  │  Month/Week/Day  │  AI Assistant  │     │
│  └─────────┴──────────────────┴────────────────┘     │
│  TanStack Query · Zustand · Tailwind · Radix UI      │
└──────────────────────────────────────────────────────┘
                        ↕ API Routes
┌──────────────────────────────────────────────────────┐
│              Backend (Next.js API Routes)             │
│  /api/chat     → AI conversation, function calling   │
│  /api/events   → Event CRUD                          │
│  /api/tasks    → Task CRUD, reorder, subtasks        │
│  /api/sync     → Google Calendar/Tasks sync          │
│  /api/rag      → Semantic search, reindex            │
│  /api/billing  → Checkout, subscription, manage      │
│  /api/audio    → Transcription (Whisper)             │
│  /api/webhooks → LemonSqueezy payments               │
│  NextAuth.js · Prisma ORM · OpenAI GPT-4o            │
└──────────────────────────────────────────────────────┘
                        ↕
┌──────────────────────────────────────────────────────┐
│         Database (PostgreSQL + pgvector)              │
│  17 models · vector embeddings on Event + Task       │
└──────────────────────────────────────────────────────┘
                        ↕
┌──────────────────────────────────────────────────────┐
│  Google Calendar API · Google Tasks API · OpenAI     │
│  LemonSqueezy · Redis + BullMQ                       │
└──────────────────────────────────────────────────────┘
\`\`\`

---

## Tech Stack

| Layer | Technology | Version |
|---|---|---|
| **Framework** | Next.js (App Router) | 14.2 |
| **Language** | TypeScript | 5.4 |
| **UI** | React + Tailwind CSS + Radix UI | 18.3 / 3.4 |
| **State** | TanStack Query + Zustand | 5.28 / 4.5 |
| **ORM** | Prisma | 6.19 |
| **Database** | PostgreSQL + pgvector | — |
| **Auth** | NextAuth.js | 4.24 |
| **AI** | OpenAI SDK | 4.104 |
| **Queue** | BullMQ + Redis (ioredis) | 5.4 / 5.3 |
| **Billing** | LemonSqueezy API | — |
| **Dates** | date-fns + chrono-node + rrule | 3.3 / 2.9 / 2.8 |
| **Testing** | Vitest | 4.0 |
| **Container** | Docker (node:20-alpine) | — |
| **Deploy** | Railway | — |

## Database (17 Models)
